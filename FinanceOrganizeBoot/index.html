<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance App | Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        /* Pequenos ajustes customizados apenas para manter as cores de destaque originais */
        .value-income {
            color: #198754;
            font-weight: 500;
        }

        .value-expense {
            color: #dc3545;
            font-weight: 500;
        }

        body {
            background-color: #f8f9fa;
        }
    </style>
</head>

<body>

    <header class="bg-dark text-white py-4 mb-4 shadow-sm">
        <div class="container">
            <h1 class="h3 mb-0"><i class="bi bi-wallet2 me-2"></i>Minhas Finanças</h1>
        </div>
    </header>

    <main class="container">

        <section class="row g-3 mb-4">
            <div class="col-12 col-md-4">
                <div class="card bg-success-subtle text-success-emphasis border-0 shadow-sm p-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <h3 class="h6 mb-1 text-uppercase fw-bold">Entradas</h3>
                        <i class="bi bi-arrow-up-circle fs-4 text-success"></i>
                    </div>
                    <p id="income-display" class="fs-3 fw-bold mb-0">R$ 0,00</p>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card bg-danger-subtle text-danger-emphasis border-0 shadow-sm p-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <h3 class="h6 mb-1 text-uppercase fw-bold">Saídas</h3>
                        <i class="bi bi-arrow-down-circle fs-4 text-danger"></i>
                    </div>
                    <p id="expense-display" class="fs-3 fw-bold mb-0">R$ 0,00</p>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card bg-primary text-white border-0 shadow-sm p-3">
                    <div class="d-flex justify-content-between align-items-center">
                        <h3 class="h6 mb-1 text-uppercase fw-bold">Saldo Atual</h3>
                        <i class="bi bi-currency-dollar fs-4"></i>
                    </div>
                    <p id="total-display" class="fs-3 fw-bold mb-0">R$ 0,00</p>
                </div>
            </div>
        </section>

        <div class="row g-4">

            <section class="col-12 col-lg-4">
                <div class="card p-4 border-0 shadow-sm">
                    <h2 class="h5 mb-3 fw-bold text-secondary">Nova Transação</h2>

                    <form id="transaction-form">
                        <div class="mb-3">
                            <label for="description" class="form-label">Descrição</label>
                            <input type="text" id="description" class="form-control"
                                placeholder="Ex: Salário, Aluguel, Mercado" required>
                        </div>

                        <div class="row g-2 mb-3">
                            <div class="col-6">
                                <label for="type" class="form-label">Tipo</label>
                                <select id="type" class="form-select" required>
                                    <option value="income">Entrada (+)</option>
                                    <option value="expense">Saída (-)</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label for="category" class="form-label">Categoria</label>
                                <select id="category" class="form-select" required>
                                    <option value="" disabled selected>Selecione</option>
                                    <option value="Alimentação">Alimentação</option>
                                    <option value="Automóvel">Automóvel</option>
                                    <option value="Moradia">Moradia</option>
                                    <option value="Transporte">Transporte</option>
                                    <option value="Lazer">Lazer</option>
                                    <option value="Saúde">Saúde</option>
                                    <option value="Investimentos">Investimentos</option>
                                    <option value="Salário">Salário</option>
                                    <option value="Outros">Outros</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="amount" class="form-label">Valor (R$)</label>
                            <input type="number" step="0.01" min="0.01" id="amount" class="form-control"
                                placeholder="Ex: 50.00" required>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-success fw-medium"><i
                                    class="bi bi-plus-lg me-1"></i>Adicionar</button>
                            <button type="button" id="report-btn" class="btn btn-outline-secondary btn-sm"><i
                                    class="bi bi-file-earmark-pdf me-1"></i>Extrair Relatório</button>
                        </div>
                    </form>
                </div>
            </section>

            <section class="col-12 col-lg-8">
                <div class="card p-4 border-0 shadow-sm">
                    <h2 class="h5 mb-3 fw-bold text-secondary">Histórico</h2>

                    <div class="table-responsive">
                        <table id="data-table" class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Descrição</th>
                                    <th>Categoria</th>
                                    <th>Valor</th>
                                    <th class="text-center">Ação</th>
                                </tr>
                            </thead>
                            <tbody id="transaction-list">
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <div id="print-section"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <script>
        const balanceIncome = document.getElementById('income-display');
        const balanceExpense = document.getElementById('expense-display');
        const balanceTotal = document.getElementById('total-display');
        const form = document.getElementById('transaction-form');
        const descriptionInput = document.getElementById('description');
        const typeInput = document.getElementById('type');
        const categoryInput = document.getElementById('category');
        const amountInput = document.getElementById('amount');
        const transactionList = document.getElementById('transaction-list');

        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

        function updateLocalStorage() {
            localStorage.setItem('transactions', JSON.stringify(transactions));
        }

        function formatCurrency(value) {
            return value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function addTransactionIntoDOM(transaction) {
            const isExpense = transaction.amount < 0;
            const CSSClass = isExpense ? 'value-expense' : 'value-income';
            const amountFormatted = formatCurrency(Math.abs(transaction.amount));

            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${transaction.description}</td>
                <td><span class="badge bg-light text-dark border px-2 py-1fw-normal">${transaction.category || 'Outros'}</span></td>
                <td class="${CSSClass}">${isExpense ? '-' : ''} ${amountFormatted}</td>
                <td class="text-center">
                    <button class="btn btn-sm btn-outline-danger py-0 px-2" onclick="removeTransaction(${transaction.id})">
                        <i class="bi bi-trash3"></i> Excluir
                    </button>
                </td>
            `;
            transactionList.appendChild(row);
        }

        function updateBalanceValues() {
            const transactionAmounts = transactions.map(t => t.amount);

            const income = transactionAmounts
                .filter(value => value > 0)
                .reduce((accumulator, value) => accumulator + value, 0);

            const expense = transactionAmounts
                .filter(value => value < 0)
                .reduce((accumulator, value) => accumulator + value, 0);

            const total = transactionAmounts.reduce((accumulator, value) => accumulator + value, 0);

            balanceIncome.textContent = formatCurrency(income);
            balanceExpense.textContent = formatCurrency(Math.abs(expense));
            balanceTotal.textContent = formatCurrency(total);
        }

        window.removeTransaction = function (id) {
            transactions = transactions.filter(t => t.id !== id);
            updateLocalStorage();
            init();
        }

        function init() {
            transactionList.innerHTML = '';
            transactions.forEach(addTransactionIntoDOM);
            updateBalanceValues();
        }

        form.addEventListener('submit', event => {
            event.preventDefault();

            const desc = descriptionInput.value.trim();
            const cat = categoryInput.value;
            let value = parseFloat(amountInput.value);

            if (typeInput.value === 'expense') {
                value = -Math.abs(value);
            } else {
                value = Math.abs(value);
            }

            const transaction = {
                id: Math.floor(Math.random() * 100000),
                description: desc,
                category: cat,
                amount: value
            };

            transactions.push(transaction);
            updateLocalStorage();
            init();

            descriptionInput.value = '';
            categoryInput.value = '';
            amountInput.value = '';
        });

        /* RELATÓRIO COMPLETO PARA IMPRESSÃO */
        document.getElementById('report-btn').addEventListener('click', () => {
            if (typeof transactions === 'undefined' || transactions.length === 0) {
                alert('Adicione pelo menos uma transação para gerar o relatório.');
                return;
            }

            const incomes = transactions.filter(t => t.amount > 0);
            const expenses = transactions.filter(t => t.amount < 0);
            const formatPdfCurrency = (value) => value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

            const incomeRows = incomes.map(t => `
                <tr>
                    <td style="padding: 10px 12px; border-bottom: 1px solid #e1e1e6;">${t.description}</td>
                    <td style="padding: 10px 12px; border-bottom: 1px solid #e1e1e6; color: #666; font-size: 10pt;">${t.category || 'Outros'}</td>
                    <td style="padding: 10px 12px; border-bottom: 1px solid #e1e1e6; color: #198754; text-align: right; font-weight: 500;">${formatPdfCurrency(t.amount)}</td>
                </tr>
            `).join('');

            const expenseRows = expenses.map(t => `
                <tr>
                    <td style="padding: 10px 12px; border-bottom: 1px solid #e1e1e6;">${t.description}</td>
                    <td style="padding: 10px 12px; border-bottom: 1px solid #e1e1e6; color: #666; font-size: 10pt;">${t.category || 'Outros'}</td>
                    <td style="padding: 10px 12px; border-bottom: 1px solid #e1e1e6; color: #dc3545; text-align: right; font-weight: 500;">- ${formatPdfCurrency(Math.abs(t.amount))}</td>
                </tr>
            `).join('');

            const categorySummaryMap = {};
            transactions.forEach(t => {
                const cat = t.category || 'Outros';
                if (!categorySummaryMap[cat]) categorySummaryMap[cat] = 0;
                categorySummaryMap[cat] += t.amount;
            });

            const categoryRows = Object.entries(categorySummaryMap).map(([cat, total]) => `
                <tr>
                    <td style="padding: 10px 12px; border-bottom: 1px solid #e1e1e6; font-weight: 500;">${cat}</td>
                    <td style="padding: 10px 12px; border-bottom: 1px solid #e1e1e6; text-align: right; font-weight: bold; color: ${total >= 0 ? '#198754' : '#dc3545'};">
                        ${total < 0 ? '-' : ''} ${formatPdfCurrency(Math.abs(total))}
                    </td>
                </tr>
            `).join('');

            const totalIncome = incomes.reduce((acc, t) => acc + t.amount, 0);
            const totalExpense = expenses.reduce((acc, t) => acc + t.amount, 0);
            const finalBalance = totalIncome + totalExpense;

            const printSection = document.getElementById('print-section');

            printSection.innerHTML = `
                <div style="font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #2e2e2e; padding: 20mm 15mm; background-color: #ffffff;">
                    <div style="border-bottom: 2px solid #212529; padding-bottom: 10px; margin-bottom: 25px;">
                        <h1 style="font-size: 20pt; color: #212529; margin: 0 0 5px 0; font-weight: 700;">Relatório de Movimentação Financeira</h1>
                        <p style="font-size: 10pt; color: #666; margin: 0;">Data do Relatório: ${new Date().toLocaleDateString('pt-BR')} às ${new Date().toLocaleTimeString('pt-BR')}</p>
                    </div>

                    <div style="background-color: #f8f9fa; border-left: 4px solid #212529; padding: 15px; margin-bottom: 30px;">
                        <table style="width: 100%; border-collapse: collapse;">
                            <tr>
                                <td style="padding: 4px 0;"><strong>Total de Entradas:</strong></td>
                                <td style="text-align: right; color: #198754; font-weight: bold;">${formatPdfCurrency(totalIncome)}</td>
                            </tr>
                            <tr>
                                <td style="padding: 4px 0;"><strong>Total de Saídas:</strong></td>
                                <td style="text-align: right; color: #dc3545; font-weight: bold;">- ${formatPdfCurrency(Math.abs(totalExpense))}</td>
                            </tr>
                            <tr style="font-size: 12pt; border-top: 1px solid #ccc;">
                                <td style="padding: 4px;"><strong>Saldo Consolidado:</strong></td>
                                <td style="text-align: right; padding-top: 8px; color: ${finalBalance >= 0 ? '#198754' : '#dc3545'}; font-weight: bold;">
                                    ${formatPdfCurrency(finalBalance)}
                                </td>
                            </tr>
                        </table>
                    </div>

                    <div style="font-size: 13pt; color: #121214; margin: 25px 0 10px 0; padding-bottom: 5px; border-bottom: 1px solid #e1e1e6; font-weight: 600;">1. Detalhamento de Entradas (Receitas)</div>
                    ${incomes.length > 0 ? `
                        <table style="width: 100%; border-collapse: collapse; margin-bottom: 25px;">
                            <thead>
                                <tr style="background-color: #f8f9fa; color: #495057; font-weight: 600; text-align: left;">
                                    <th style="padding: 10px 12px; font-size: 10pt; border-bottom: 2px solid #198754;">Descrição</th>
                                    <th style="padding: 10px 12px; font-size: 10pt; border-bottom: 2px solid #198754;">Categoria</th>
                                    <th style="padding: 10px 12px; font-size: 10pt; border-bottom: 2px solid #198754; text-align: right;">Valor</th>
                                </tr>
                            </thead>
                            <tbody>${incomeRows}</tbody>
                        </table>
                    ` : `<p style="color: #888; font-style: italic; padding: 5px 12px; font-size: 10pt;">Nenhuma entrada registrada no período.</p>`}

                    <div style="font-size: 13pt; color: #121214; margin: 25px 0 10px 0; padding-bottom: 5px; border-bottom: 1px solid #e1e1e6; font-weight: 600;">2. Detalhamento de Saídas (Despesas / Gastos)</div>
                    ${expenses.length > 0 ? `
                        <table style="width: 100%; border-collapse: collapse; margin-bottom: 35px;">
                            <thead>
                                <tr style="background-color: #f8f9fa; color: #495057; font-weight: 600; text-align: left;">
                                    <th style="padding: 10px 12px; font-size: 10pt; border-bottom: 2px solid #dc3545;">Descrição</th>
                                    <th style="padding: 10px 12px; font-size: 10pt; border-bottom: 2px solid #dc3545;">Categoria</th>
                                    <th style="padding: 10px 12px; font-size: 10pt; border-bottom: 2px solid #dc3545; text-align: right;">Valor</th>
                                </tr>
                            </thead>
                            <tbody>${expenseRows}</tbody>
                        </table>
                    ` : `<p style="color: #888; font-style: italic; padding: 5px 12px; font-size: 10pt;">Nenhuma saída registrada no período.</p>`}

                    <div style="page-break-before: always; font-size: 13pt; color: #121214; padding-top: 10mm; margin: 0 0 10px 0; padding-bottom: 5px; border-bottom: 1px solid #e1e1e6; font-weight: 600;">3. Resumo Consolidado por Categoria</div>
                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 15px;">
                        <thead>
                            <tr style="background-color: #f8f9fa; color: #495057; font-weight: 600; text-align: left;">
                                <th style="padding: 10px 12px; font-size: 10pt; border-bottom: 2px solid #6c757d;">Categoria</th>
                                <th style="padding: 10px 12px; font-size: 10pt; border-bottom: 2px solid #6c757d; text-align: right;">Total Líquido</th>
                            </tr>
                        </thead>
                        <tbody>${categoryRows}</tbody>
                    </table>
                </div>
            `;

            window.print();
            printSection.innerHTML = '';
        });

        init();
    </script>
</body>

</html>
